# redflag.web3 — Nginx Production Config
# Reemplaza TU_DOMINIO.COM con tu dominio real

upstream redflag_node1 {
    server node1:8545;
    keepalive 32;
}

upstream redflag_node2 {
    server node2:8546;
    keepalive 32;
}

upstream redflag_bridge {
    server bridge:8547;
    keepalive 16;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=faucet:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=ws:10m rate=10r/m;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name TU_DOMINIO.COM www.TU_DOMINIO.COM;
    return 301 https://$host$request_uri;
}

# ── HTTPS principal (Node 1 + Dashboard) ─────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name TU_DOMINIO.COM www.TU_DOMINIO.COM;

    # SSL — Let's Encrypt (generado con certbot)
    ssl_certificate     /etc/letsencrypt/live/TU_DOMINIO.COM/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/TU_DOMINIO.COM/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Compresión
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1000;

    client_max_body_size 1m;

    # ── Dashboard / Frontend ──────────────────────────────────────────────────
    location / {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://redflag_node1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── WebSocket tiempo real ─────────────────────────────────────────────────
    location /ws {
        limit_req zone=ws burst=5 nodelay;
        proxy_pass http://redflag_node1;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;  # 1 hora para WS
    }

    # ── Faucet — rate limit estricto ──────────────────────────────────────────
    location /wallet/faucet {
        limit_req zone=faucet burst=2 nodelay;
        proxy_pass http://redflag_node1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── API endpoints ─────────────────────────────────────────────────────────
    location ~ ^/(status|balance|account|history|tx|mempool|dag|explorer|dex|bridge|metrics|network) {
        limit_req zone=api burst=30 nodelay;
        proxy_pass http://redflag_node1;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS";
        add_header Access-Control-Allow-Headers "Content-Type, Authorization";
    }
}

# ── Nodo 2 (RPC secundario / validador) ──────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name rpc2.TU_DOMINIO.COM;

    ssl_certificate     /etc/letsencrypt/live/TU_DOMINIO.COM/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/TU_DOMINIO.COM/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://redflag_node2;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin *;
    }
}

# ── Bridge API ────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name bridge.TU_DOMINIO.COM;

    ssl_certificate     /etc/letsencrypt/live/TU_DOMINIO.COM/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/TU_DOMINIO.COM/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://redflag_bridge;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin *;
    }
}
