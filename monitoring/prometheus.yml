global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: redflag-node1
    static_configs:
      - targets: ['node1:8545']
        labels:
          instance: node1
    metrics_path: /metrics

  - job_name: redflag-node2
    static_configs:
      - targets: ['node2:8546']
        labels:
          instance: node2
    metrics_path: /metrics
